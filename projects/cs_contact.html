<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Sweet Crumbs Cake Shop</title>
  <link rel="stylesheet" href="cake_shop.css" />
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #fff8f0;
      margin: 0;
      padding: 0;
    }

    .container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* Header */
.pro-header {
  background-color: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  padding: 1rem 0;
  position: sticky;
  top: 0;
  z-index: 1000;
}

/* Logo */
.logo {
  display: flex;
  align-items: center;
  font-size: 1.8rem;
  font-weight: bold;
  color: #ff6f61;
  font-family: 'Segoe UI', sans-serif;
}

.logo-img {
  height: 60px;
  width: auto;
}

    .contact-section {
      max-width: 1000px;
      margin: auto;
      padding: 50px 20px;
    }

    h2 {
      text-align: center;
      font-size: 2.8em;
      color: #d35400;
      margin-bottom: 30px;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 40px;
    }

    .contact-form {
      background-color: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .contact-form label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #333;
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 1em;
    }

    .contact-form button {
      background-color: #d35400;
      color: #fff;
      border: none;
      padding: 12px 20px;
      font-size: 1em;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .contact-form button:hover {
      background-color: #b84300;
    }

    .contact-info {
      background-color: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      font-size: 1.1em;
      color: #444;
    }

    .contact-info p {
      margin: 10px 0;
    }

    .map-placeholder {
      margin-top: 20px;
      background-color: #eee;
      border-radius: 10px;
      text-align: center;
      line-height: 200px;
      color: #999;
      font-size: 1.2em;
    }

.map-iframe {
  width: 100%;
  height: 300px;
  border: 0;
  border-radius: 10px;
}
  </style>
</head>
<body>

    <header class="pro-header">
  <div class="container">
    <div class="logo">
        <img class="logo-img" src="Images/logo.png" alt="Cake Bliss Logo">Cake Bliss
    </div>
    <button class="menu-toggle" aria-label="Open navigation menu" aria-expanded="false">☰</button>
    <nav class="navbar">
      <ul class="nav-links" aria-hidden="true">
        <li><a href="cake_shop.html">Home</a></li>
        <li><a href="cs_about.html">About</a></li>
        <li><a href="cs_menu.html">Menu</a></li>
        <li><a href="cs_gallery.html">Gallery</a></li>
        <li><a href="cs_contact.html">Contact</a></li>
        <li><a href="login.html">Login</a></li>
      </ul>
    </nav>
  </div>
</header>

  <section class="contact-section">
    <h2>Contact Us</h2>
    <div class="contact-grid">

      <!-- Contact Form -->
      <div class="contact-form">
        <form>
          <label for="name">Your Name</label>
          <input type="text" id="name" name="name" placeholder="Enter your name" required>

          <label for="contact">Your Contact Number</label>
          <input type="text" id="contact" name="contact" placeholder="Enter your contact number" required>

          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required>

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Your message..." required></textarea>

          <button type="submit">Send Message</button>
        </form>
      </div>

      <!-- Contact Info -->
      <div class="contact-info">
        <p><strong>Cake Bliss</strong></p>
        <p>123 Bakery Lane, Hazaribagh, Jharkhand</p>
        <p>📞 +91 98765 43210</p>
        <p>📧 hello@cakebliss.in</p>
        <p>🕒 Open Daily: 10 AM – 8 PM</p>

        <!--class="map-placeholder-->
          <div class="map-container">
            <iframe class="map-iframe"
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d19121.998541952136!2d85.52919883883264!3d23.784759204473865!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x39f48bab7932e0d1%3A0x600fb2a23beff57c!2sCakes%20Of%20Bliss!5e0!3m2!1sen!2sin!4v1758556067662!5m2!1sen!2sin"></iframe>
            </iframe>
         </div>

        </div>
      </div>

    </div>
  </section>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
  const toggle = document.querySelector(".menu-toggle");
  const navLinks = document.querySelector(".nav-links");
  const themeToggle = document.getElementById("theme-toggle");

  if (themeToggle) {
    themeToggle.addEventListener("click", () => {
      document.body.classList.toggle("dark-theme");
    });
  }

  if (toggle && navLinks) {
    toggle.addEventListener("click", () => {
      navLinks.classList.toggle("active");
      const expanded = navLinks.classList.contains("active");
      toggle.setAttribute("aria-expanded", expanded.toString());
      navLinks.setAttribute("aria-hidden", (!expanded).toString());
    });
  }
});
  </script>

</body>
</html>
