<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register | Sweet Treats Cake Shop</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092') no-repeat center center fixed;
      background-size: cover;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .register-container {
      background-color: rgba(255, 248, 240, 0.95);
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    .register-container h1 {
      color: #d2691e;
      margin-bottom: 24px;
    }

    .register-form label {
      display: block;
      margin: 12px 0 6px;
      text-align: left;
      color: #555;
    }

    .register-form input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }

    .register-form button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background-color: #d2691e;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    .register-form button:hover {
      background-color: #b35900;
    }

    .login-link {
      margin-top: 15px;
      display: block;
      color: #d2691e;
      text-decoration: none;
    }

    .login-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="register-container">
    <h1>Create Your Account 🍰</h1>
    <form class="register-form" method="post" action="Registration.php" onsubmit="return registerUser()">
  <label for="name">Full Name</label>
  <input type="text" id="name" name="name" placeholder="Your name" required>

  <label for="email">Email</label>
  <input type="email" id="email" name="email" placeholder="you@example.com" required>

  <label for="contact">Contact Number</label>
  <input type="tel" id="contact" name="contact" placeholder="Your contact number" required>

  <label for="username">Username</label>
  <input type="text" id="username" name="username" placeholder="Choose a username" required>

  <label for="password">Password</label>
  <input type="password" id="password" name="password" placeholder="Create a password" required>

  <button type="submit">Register</button>
</form>

    <a href="login.html" class="login-link">Already have an account? Login</a>
  </div>

  <script src="Registration.js"></script>

</body>
</html>
